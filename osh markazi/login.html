<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osh Markazi - Admin Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .login-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--off-white);
            padding: 20px;
        }
        .login-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 30px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card .logo {
            font-size: 2rem;
            margin-bottom: 30px;
            display: inline-block;
        }
        .login-card h2 {
            margin-bottom: 10px;
            font-weight: 700;
        }
        .login-card p {
            color: var(--text-light);
            margin-bottom: 30px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.1);
            background: var(--off-white);
            font-family: inherit;
        }
        [data-theme="dark"] .form-group input {
            border-color: rgba(255,255,255,0.1);
        }
        .login-btn {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: var(--primary-gold);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }
        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <a href="index.html" class="logo">
                <span class="gold-text">Osh</span> Markazi
            </a>
            <h2>Xush kelibsiz!</h2>
            <p>Admin panelga kirish uchun ma'lumotlarni kiriting.</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label>Login</label>
                    <input type="text" id="login" placeholder="Admin login" required>
                </div>
                <div class="form-group">
                    <label>Parol</label>
                    <input type="password" id="parol" placeholder="••••••••" required>
                </div>
                <button type="submit" class="login-btn" id="submit-btn">Kirish</button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const loginForm = document.getElementById('login-form');
        const submitBtn = document.getElementById('submit-btn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const login = document.getElementById('login').value;
            const parol = document.getElementById('parol').value;

            submitBtn.textContent = 'Yuklanmoqda...';
            submitBtn.disabled = true;

            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login, parol })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = 'admin.html';
                } else {
                    alert(data.message);
                }
            } catch (error) {
                alert("Serverga ulanib bo'lmadi");
            } finally {
                submitBtn.textContent = 'Kirish';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
